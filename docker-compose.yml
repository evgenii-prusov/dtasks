services:
  app:
    build:
      context: .
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
    image: ghcr.io/evgenii-prusov/dtasks:latest
    restart: unless-stopped
    env_file: .env
    environment:
      DTASKS_DB_PATH: /data/dtasks.sqlite
      DTASKS_SESSION_DIR: /data/sessions
      DTASKS_SECURE_COOKIES: "1"
      DTASKS_PUBLIC_URL: https://${DOMAIN}
    volumes:
      - dtasks-data:/data
    expose:
      - "8000"
    networks:
      web:
        aliases:
          - dtasks-app

networks:
  web:
    external: true

volumes:
  dtasks-data:
